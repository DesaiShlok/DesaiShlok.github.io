<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Management System — 3D View</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f1117;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        nav {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            border-bottom: 1px solid #1e2030;
        }
        nav a {
            color: #7c8aff;
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 600;
        }
        nav a:hover { text-decoration: underline; }
        nav h1 {
            font-size: 1.2em;
            color: #fff;
        }
        .badge {
            background: #2a2d3a;
            color: #7c8aff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .viewer-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        model-viewer {
            flex: 1;
            width: 100%;
            min-height: 0;
            background-color: #12141c;
        }
        .info-bar {
            padding: 20px 24px;
            border-top: 1px solid #1e2030;
        }
        .info-bar p {
            color: #888;
            font-size: 0.95em;
            line-height: 1.5;
        }
        .hint {
            color: #555;
            font-size: 0.85em;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">← Back</a>
        <h1>Battery Management System</h1>
        <span class="badge">BMS</span>
    </nav>
    <div class="viewer-wrap">
        <model-viewer
            src="BMS.glb"
            alt="3D model of the Battery Management System PCB"
            auto-rotate
            rotation-per-second="30deg"
            camera-controls
            shadow-intensity="1">
        </model-viewer>
    </div>
    <div class="info-bar">
        <p>Intelligent battery management for charging, balancing, and protection.</p>
        <p class="hint">Drag to rotate · Scroll to zoom · Model auto-rotates</p>
    </div>
</body>
</html>
